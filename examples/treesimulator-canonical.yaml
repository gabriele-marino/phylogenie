output_dir: outputs/treesimulator-canonical
n_samples:
  train: 100
  val: 10
  test: 10
n_jobs: -1
seed: 42

data_type: trees
backend: treesimulator

parameterization: canonical
populations: [A, B, C]
transition_rates: mu
transmission_rates: la
removal_rates: psi
sampling_proportions: s

min_tips: 50
max_tips: 250

context:
  mu:
    n_dim: 2
    N: 3
    zero_diagonal: true
    x:
      type: lognormal
      mean: 1
      std: 0.2
  la:
    n_dim: 2
    N: 3
    x:
      type: lognormal
      mean: 1
      std: 0.3
  psi:
    n_dim: 1
    N: 3
    x:
      type: uniform
      low: 0.1
      high: 1
  s:
    type: uniform
    low: 0.1
    high: 1
