output_dir: outputs/treesimulator-BDEI-skyline
n_samples:
  train: 100
  val: 10
  test: 10
n_jobs: -1
seed: 42

data_type: trees
backend: treesimulator

parameterization: BDEI
reproduction_number: R_0
infectious_period:
  value: infection_time*(1-incubation_fraction)
  change_times: [0.5]
incubation_period:
  value: infection_time*incubation_fraction
  change_times: [incubation_period_change_time]
sampling_proportion: s

min_tips: 50
max_tips: 250

context:
  s:
    type: uniform
    low: 0.25
    high: 0.7
  R_0:
    type: lognormal
    mean: 1
    std: 0.2
  infection_time:
    n_dim: 1
    x:
      type: lognormal
      mean: 1
      std: 0.3
    N: 2
  incubation_fraction:
    type: uniform
    low: 0
    high: 0.7
  incubation_period_change_time:
    type: uniform
    low: 0
    high: 0.7