# --------------------------------
# 6. BD trees with contact tracing
# --------------------------------

# This tutorial walks you through setting up a configuration file to simulate phylogenetic trees with a birth-death with contact tracing (BD-CT) model. Contact tracing extension of multi-type birth-death (MTBD) models was introduced by Zhukova & Gascuel (https://journals.plos.org/ploscompbiol/article?id=10.1371/journal.pcbi.1012461). In this example, we will add contact tracing to the simple BD model.

# In this example, we generate a dataset with 100 samples. For each sample:
# - The reproduction number is drawn from a lognormal distribution (mean=1, sigma=0.2);
# - The sampling proportion is drawn from a uniform distribution (low=0.1, high=0.7).
# - The infectious period is fixed at 2.5.
# - The notification probability is drawn from a uniform distribution (low=0.3, high=0.9).
# - The maximum number of notified contacts is drawn from an integer distribution (low=1, high=6).

# For each simulation, a target number of tips between 50 and 250 is drawn. The simulation ends either when the target number of tips is reached.

# ---------------
# General configs
# ---------------

output_dir: outputs/BD-CT-Trees
data_type: trees
n_samples: 100
n_jobs: 1
seed: 42

# -------
# Context
# -------

context:
  R_0:
    type: lognormal
    mean: 1
    sigma: 0.2
  s:
    type: uniform
    low: 0
    high: 0.7
  p:
    type: uniform
    low: 0.3
    high: 0.9
  C:
    type: integers
    low: 1
    high: 6 # Note: high is exclusive, so this will generate integers from 1 to 5

# ------------------------------------
# Parameterization-specific parameters
# ------------------------------------

parameterization: BD
reproduction_number: R_0
sampling_proportion: p
infectious_period: 2.5

# --------------------------
# Tree simulation parameters
# --------------------------

min_tips: 50
max_tips: 250

notification_probability: p
max_notified_contacts: C

# Optional parameters for contact tracing:
# - samplable_states_after_notification: list of str (None by default)
#   The states from which individuals can be sampled after notification. This is only necessary for contact tracing models. If not provided, all states will be considered samplable.
# - sampling_rate_after_notification: SkylineParameter (infinity by default)
#   The rate at which individuals are sampled after notification. This is only necessary for contact tracing models.
# - contacts_removal_probability: SkylineParameter (1 by default)
#   The probability of removing contacts after sampling. This is only necessary for contact tracing models.