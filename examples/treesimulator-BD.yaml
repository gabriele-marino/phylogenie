output_dir: outputs/treesimulator-BD
n_samples:
  train: 100
  val: 10
  test: 10
n_jobs: -1
seed: 42

data_type: trees
backend: treesimulator

parameterization: BD
reproduction_number: R_0
infectious_period: T_I
sampling_proportion: 0.25

min_tips: 50
max_tips: 250

context:
  R_0:
    type: lognormal
    mean: 1
    std: 0.2
  T_I:
    type: lognormal
    mean: 1
    std: 0.3