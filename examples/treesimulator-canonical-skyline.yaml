output_dir: outputs/treesimulator-canonical-skyline
n_samples:
  train: 100
  val: 10
  test: 10
n_jobs: -1
seed: 42

data_type: trees
backend: treesimulator

parameterization: canonical
populations: [A, B, C]
transition_rates:
  value: mu
  change_times: mu_change_times
transmission_rates: la
removal_rates: psi
sampling_proportions:
  value: [0.2, s_t2, s_t3]
  change_times: [0.5, 0.75]

min_tips: 50
max_tips: 250

context:
  mu:
    n_dim: 3
    T: 4
    N: 3
    zero_diagonal: true
    x:
      type: lognormal
      mean: 1
      std: 0.2
  mu_change_times:
    n_dim: 1
    N: 3
    x:
      type: uniform
      low: 0.1
      high: 0.9
  la:
    n_dim: 2
    N: 3
    x:
      type: lognormal
      mean: 1
      std: 0.3
  psi:
    n_dim: 1
    N: 3
    x:
      type: uniform
      low: 0.1
      high: 1
  s_t2:
    n_dim: 1
    N: 3
    x:
      type: uniform
      low: 0.3
      high: 0.7
  s_t3:
    n_dim: 1
    N: 3
    x:
      type: uniform
      low: 0.5
      high: 1

